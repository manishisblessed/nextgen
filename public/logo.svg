<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" role="img" aria-label="NextGenPay — PG, POS, QR Payments">
  <defs>
    <linearGradient id="lpBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="55%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="lpBolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#d4a843"/>
    </linearGradient>
    <linearGradient id="lpShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lpAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#d4a843"/>
    </linearGradient>
  </defs>

  <!-- ===== MARK ===== -->
  <g>
    <rect width="64" height="64" rx="14" fill="url(#lpBg)"/>
    <rect width="64" height="64" rx="14" fill="url(#lpShine)"/>
    <rect x="14" y="15" width="8" height="34" rx="2" fill="#ffffff"/>
    <rect x="42" y="15" width="8" height="34" rx="2" fill="#ffffff"/>
    <path d="M14 15 L22 15 L50 49 L42 49 Z" fill="url(#lpBolt)"/>
    <path d="M53 20 L58 24.5 L53 29" fill="none" stroke="#d4a843" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="52" cy="52" r="3.2" fill="#34d399"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <g transform="translate(78, 0)" font-family="Manrope, 'Segoe UI', system-ui, sans-serif">
    <text x="0" y="34" font-size="26" font-weight="800" letter-spacing="-0.6" fill="#0e1626">
      NextGen<tspan fill="url(#lpAccent)">Pay</tspan>
    </text>
    <text x="2" y="52" font-size="9.5" font-weight="600" letter-spacing="3.2" fill="#516a8c">
      PG &#183; POS &#183; QR PAYMENTS
    </text>
  </g>
</svg>
