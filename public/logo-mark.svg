<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="NextGenPay mark">
  <defs>
    <linearGradient id="ngmBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="55%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="ngmBolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#d4a843"/>
    </linearGradient>
    <linearGradient id="ngmShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ngmGlow" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#ngmBg)"/>
  <rect width="64" height="64" rx="14" fill="url(#ngmGlow)"/>
  <rect width="64" height="64" rx="14" fill="url(#ngmShine)"/>

  <!-- N monogram with gradient "next" bolt diagonal -->
  <rect x="14" y="15" width="8" height="34" rx="2" fill="#ffffff"/>
  <rect x="42" y="15" width="8" height="34" rx="2" fill="#ffffff"/>
  <path d="M14 15 L22 15 L50 49 L42 49 Z" fill="url(#ngmBolt)"/>

  <!-- forward chevron -->
  <path d="M53 20 L58 24.5 L53 29" fill="none" stroke="#d4a843" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="52" cy="52" r="3.2" fill="#34d399"/>
  <circle cx="52" cy="52" r="3.2" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1"/>
</svg>
