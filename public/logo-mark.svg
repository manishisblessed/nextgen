<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Payprism">
  <defs>
    <linearGradient id="ppBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f7bff"/>
      <stop offset="55%" stop-color="#185df5"/>
      <stop offset="100%" stop-color="#1448dc"/>
    </linearGradient>
    <linearGradient id="ppShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ppRayWarm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd388" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffd388" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ppRayCoral" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff9a7a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff9a7a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ppRayCyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7fe1ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7fe1ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ppGlow" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square base with brand gradient -->
  <rect width="64" height="64" rx="14" fill="url(#ppBg)"/>
  <rect width="64" height="64" rx="14" fill="url(#ppGlow)"/>
  <rect width="64" height="64" rx="14" fill="url(#ppShine)"/>

  <!-- Refraction rays emerging from the prism (behind the P right edge) -->
  <g>
    <path d="M42 21 L58 13 L60 17 L43 26 Z" fill="url(#ppRayWarm)"/>
    <path d="M42 28 L62 28 L62 33 L42 33 Z" fill="url(#ppRayCoral)"/>
    <path d="M42 35 L60 44 L58 48 L42 39 Z" fill="url(#ppRayCyan)"/>
  </g>

  <!-- The "P"  outer silhouette -->
  <path d="
    M 13 13
    L 36 13
    C 42.6 13, 47 17.4, 47 24
    C 47 30.6, 42.6 35, 36 35
    L 22 35
    L 22 51
    L 13 51
    Z
  " fill="#ffffff"/>

  <!-- Triangular prism counter inside the P bowl -->
  <path d="
    M 22 19
    L 38 19
    L 22 33
    Z
  " fill="url(#ppBg)"/>

  <!-- Tiny entry beam reaching the prism from top-left -->
  <rect x="11" y="11" width="9" height="2" rx="1" fill="#ffffff" opacity="0.45"/>

  <!-- Subtle status dot, bottom-right -->
  <circle cx="52" cy="52" r="3.2" fill="#34d399"/>
  <circle cx="52" cy="52" r="3.2" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1"/>
</svg>
