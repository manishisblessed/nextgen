# NextGenPay — nginx (EC2)
# Final domain: https://nxtgenpay.space (served by AWS Amplify).
# This box now only:
#   1. 301-redirects the legacy user-facing domain next-gen.space → nxtgenpay.space
#      (old invite/onboarding email links keep working — token survives the redirect).
#   2. Serves the app on api.next-gen.space for partner webhooks / API callers.

# ── HTTP: ACME challenges + redirects ────────────────────────────────────────
server {
    listen 80;
    server_name next-gen.space www.next-gen.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://nxtgenpay.space$request_uri;
    }
}

server {
    listen 80;
    server_name api.next-gen.space 65.0.202.152;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://api.next-gen.space$request_uri;
    }
}

# ── HTTPS: legacy domain → permanent redirect to the final domain ────────────
server {
    listen 443 ssl;
    server_name next-gen.space www.next-gen.space;

    ssl_certificate /etc/letsencrypt/live/next-gen.space/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/next-gen.space/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    return 301 https://nxtgenpay.space$request_uri;
}

# ── HTTPS: API host still proxies to the app on :3000 (PM2) ──────────────────
server {
    listen 443 ssl;
    server_name api.next-gen.space 65.0.202.152;

    ssl_certificate /etc/letsencrypt/live/api.next-gen.space/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.next-gen.space/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size (for KYC docs)
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Next.js static assets with long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Health check endpoint
    location /api/healthz {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        access_log off;
    }
}
