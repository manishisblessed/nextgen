# NextGenPay — nginx reverse proxy (EC2 → nginx → Node/PM2 on :3000)
#
# Phase 12 cache hardening:
#   - Nothing dynamic is ever cached at the proxy (proxy_no_cache / bypass).
#   - /api/ additionally forces `Cache-Control: no-store` downstream.
#   - The ONLY cached location is /_next/static/ (immutable, content-hashed).
#   - Host is pinned to our own $host and any client-supplied X-Forwarded-Host
#     is overwritten, so it can't be used for cache poisoning / link spoofing.
#     (The app also never reads X-Forwarded-Host — see src/lib/security/audit.ts.)
#   - TLS on 443 with 80 → 443 redirect so the app's HSTS header is honored.
#
# NOTE: nginx resets ALL inherited proxy_set_header directives the moment a
# location defines its own, so the full header set is repeated per location on
# purpose. Do not "DRY" it up by hoisting to server scope.

# ── HTTP: allow ACME challenges, redirect everything else to HTTPS ───────────
server {
    listen 80;
    server_name api.next-gen.space 65.0.202.152;

    # Let certbot answer http-01 challenges before the redirect.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: main application server ───────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.next-gen.space 65.0.202.152;

    # TLS — certbot-managed certificates. If certs are not present yet, obtain
    # them once with:
    #   sudo certbot --nginx -d api.next-gen.space
    # which will populate the paths below (and wire auto-renewal via systemd).
    ssl_certificate     /etc/letsencrypt/live/api.next-gen.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.next-gen.space/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers (HSTS is honored now that traffic is TLS-only).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size (for KYC docs).
    client_max_body_size 10M;

    # Gzip.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;

    # ── API: never cached at the proxy; forced no-store downstream ────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;   # overwrite any client value
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store" always;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health check probe (more specific than /api/ so it wins for this path).
    location /api/healthz {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        access_log off;
    }

    # ── Next.js static assets — the ONLY cached location ──────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Everything else (authenticated HTML, dashboard, etc.) — never cached ──
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;   # overwrite any client value
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_no_cache 1;
        proxy_cache_bypass 1;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
