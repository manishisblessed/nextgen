version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            # --include=dev forces devDependencies to install even though
            # NODE_ENV=production is set (npm ci skips devDeps otherwise).
            # Build-time tooling (typescript, @types/*, eslint) lives there.
            - npm ci --cache .npm --prefer-offline --include=dev
            - npx prisma generate
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - .npm/**/*
          - node_modules/**/*
